    <h1>批量分配项目中的任务</h1>

    <p><strong>使用场景</strong>：需要将项目中的所有任务批量分配给某个用户。</p>
    <p><strong>步骤：</strong></p>

    <ol>
        <li>创建一个项目。</li>
        <li>在该项目中创建任务。</li>
        <li>转到任务列表，按项目筛选任务，如下图所示：
        <img src="/files/JWvaO3x.png" alt="" /></li>
        <li>选择所有任务（或希望分配给用户的任务）。
        <img src="/files/mpSG2p6.png" alt="" /></li>
        <li>转到操作 > "分配给"，选择要分配这些任务的用户。
        <img src="/files/GZFTC86.png" alt="" />
        <img src="/files/5pvnr02.png" alt="" />
        你还可以输入其他详细信息，如评论、完成人和批量设置任务的优先级。</li>
        <li>点击添加。</li>
    </ol>

    <p><strong>注意：</strong>你可以按照上述步骤在 ERPNext 中批量分配任何文档。</p>
</body>
