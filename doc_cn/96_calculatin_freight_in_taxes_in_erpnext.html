    <h1>在 ERPNext 中计算运费中的税费</h1>

    <h2 id="use-case-to-calculate-freight-forwarding-charges-with-tax-rate"><strong>用例：按税率计算运费和转运费</strong></h2>

    <p>当运费应该作为税率在转运费中计算时，我们可以按以下步骤操作：</p>

<ul>
<li>你可以在会计科目表中专门创建一个税费账户的分类账，或者你可以考虑在税务中使用 GST 税费账户来计算运费。</li>
</ul>

    <p><img src="/files/4GSyff2.png" alt="" /></p>

<ul>
<li>现在创建一个名为 <strong>运费和转货运费</strong>的商品。</li>
</ul>

    <p><img src="/files/xOovUcM.png" alt="" /></p>

<ul>
<li>你现在可以为供应商创建采购发票，并添加此商品来计算与运费相关的税费。你可以根据公司政策按净额或商品数量设置运费税率。</li>
</ul>

    <p><img src="/files/2Nh2r9p.png" alt="" /></p>
