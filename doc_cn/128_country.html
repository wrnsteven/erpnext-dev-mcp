<body>
    <h1>国家</h1>

    <p><strong>可以在系统中维护国家列表，并根据需要将相应的国家标记到不同的实体和交易中。</strong></p>

    <p><img src="/files/image4eab2b.png" alt="" /></p>

    <h2 id="how-to-add-a-country"><strong>如何添加国家？</strong></h2>

    <ol>
        <li>进入国家列表，点击"添加国家"。</li>
        <li>输入要添加的国家的名称。</li>
        <li>指定该国使用的标准日期格式。</li>
        <li>指定该国使用的标准时间格式。</li>
        <li>列出所有时区。</li>
        <li>注明该国的官方缩写。</li>
        <li>保存以将国家添加到列表中。</li>
    </ol>

    <p><img src="/files/image18164f.png" alt="" /></p>
</body>
</html>
