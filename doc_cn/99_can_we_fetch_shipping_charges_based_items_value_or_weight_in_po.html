    <h1>根据商品价值或重量获取运费</h1>

    <p>在采购订单中，我们可以根据商品的价值或重量获取<strong>运费</strong>。<br />
前往<strong>运费规则列表</strong> --> <strong>计算依据：净额或净重</strong> --> 选择运费规则条件 --> 填写表格<br />
<img src="/files/o4Q2GmE.png" alt="" /><br />
这样，在创建采购订单时，将根据商品的重量或价值获取运费。</p>
