<head>
    <meta charset="UTF-8">

    <title>文档版本控制</title>
</head>
<body>
    <h1>文档版本控制</h1>

    <p>文档版本控制帮助你跟踪对任何表单/文档所做的更改。</p>

    <p>要启用文档版本控制：</p>

    <ol>
    <li>进入自定义表单（Customize > Customize Form）</li>
    <li>选择需要启用版本控制的表单</li>
    <li>勾选<strong>Track Changes</strong>（跟踪更改）</li>
    </ol>

    <p>现在查看文档的版本历史：</p>

    <ol>
    <li>打开文档</li>
    <li>点击右上角的<strong>菜单</strong>（三点菜单）</li>
    <li>点击<strong>Version History</strong>（版本历史）</li>
    </ol>

    <p><img src="/files/version_history.png" alt="版本历史" /></p>

    <p>你将看到文档的版本历史。要查看特定版本中所做的更改，请点击该版本，它将高亮显示该版本中所做的更改。</p>

    <p><img src="/files/version_history_2.png" alt="版本历史" /></p>

</body>
</html>
