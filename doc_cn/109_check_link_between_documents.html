    <h1>检查文档之间的链接</h1>

    <p>每个文档都可以链接到 ERPNext 中的各种其他文档。</p>

    <p><strong>"链接"工具让你可以选择检查当前文档是否链接到任何先前的文档，并列出所有正向链接。</strong></p>

    <p>为此，你可以直接进入菜单并点击"链接"。将弹出一个弹出框，列出此文档链接到的所有文档。</p>

    <p><img src="/files/using-document-links-1.gif" alt="Checking Document Links" /></p>

    <blockquote>
        <p>注意：此选项仅显示文档中的正向链接；反向链接可以在文档本身中找到。</p>
    </blockquote>

    <blockquote>
        <p><strong>例如：</strong>如果你想检查哪些销售发票链接到你的销售订单，你可以从下拉菜单中检查"链接"。但是，此销售订单链接到的报价单信息应该在文档本身中。</p>
    </blockquote>
</body>
</html>
