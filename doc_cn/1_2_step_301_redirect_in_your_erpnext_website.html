    <h1>ERPNext 中的两步 301 重定向</h1>

    <p><strong>什么是 301 重定向？</strong><br />
    301 重定向用于确保搜索引擎和用户被引导到正确的页面。301 状态码用于任何页面已永久移动到其他位置的情况。用户现在将看到新 URL，因为它已替换了旧页面。</p>

    <p><strong>使用 ERPNext 实现两步 301 重定向：</strong></p>

    <p><strong>步骤 1：</strong> 通过 awesome bar（全局搜索栏）打开 Website Settings，展开 "Redirects" 标题。</p>

    <p><img src="images/1_QAoV08L.png" alt="" /></p>

    <p><strong>步骤 2：</strong> 在 Source 中输入旧 URL，在 Target 中输入新 URL，然后保存文档。</p>

    <p><img src="images/1_MNpVjLa.png" alt="" /></p>

    <p><strong>查看重定向效果：</strong></p>

    <p><img src="images/1_7ZEMlxa.gif" alt="" /></p>

    <p><img src="images/1_HuwFvOx.png" alt="" /></p>
