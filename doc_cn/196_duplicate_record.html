    <h1>重复记录</h1>

    <p><strong>"Duplicate"（重复）是一项功能，帮助你将现有文档的值原样复制到新文档中。</strong></p>

    <h2 id="scenario">场景</h2>

    <p>客户已向电子元器件供应商下了某些产品的"重新订购"订单。</p>

    <p>由于新的销售订单将与原始销售订单的所有详细信息相同，供应商可以简单地打开原始订单并"Duplicate"（复制）该订单。原始文档的值将按原样更新到新的销售订单中。此后可以根据需要进行任何更改。</p>

    <p>要创建重复文档，你可以转到原始文档，点击下拉菜单中的"Duplicate"（重复）。</p>

    <p><img src="/files/using-duplicate-record-1.gif" alt="Duplicate Record" /></p>

</body>
</html>
