    <h1>递延会计</h1>

    <p>ERPNext 中的递延会计是指在实际交易发生之后更晚的日期确认收入或费用的做法。这种会计方法通常用于预付费用、未实现收入和递延税资产或负债等项目。在 ERPNext 中，递延会计通过特定模块或功能处理，使用户能够准确记录和管理这些递延项目。</p>
