    <h1>线索、联系人和客户的区别</h1>

    <ul>
    <li><strong>线索</strong>：是潜在的客户，是可以给你带来业务的人。</li>
    <li><strong>客户</strong>：是已经给你业务的人或组织。</li>
    <li><strong>联系人</strong>：是属于客户的一个人。这适用于企业对企业的情况，在这种情况下，你可能联系属于同一客户的多个个人。</li>
    </ul>

    <p>可以通过从<strong>创建</strong>下拉列表中选择"客户"将线索转换为客户。一旦创建了客户，线索将变为"已转换"，来自同一来源的任何后续商机都可以针对此客户创建。</p>
