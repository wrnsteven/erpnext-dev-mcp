    <h1>用于价格调整的借项通知单</h1>

    <p><strong>问题：</strong></p>

<p>我们为一件价值 INR 20,000 的物料创建了采购发票。我们需要创建一张借项通知单，将该物料的价格修订为 INR 15,000。我们可以使用借项通知单处理价格波动吗？</p>

<p><strong>答案：</strong>
你完全可以针对发票本身创建借项通知单来进行价格调整。在借项通知单中，对于物料，只需输入你希望降低价格的金额。</p>

<p>原始采购发票
<img src="/files/Kh6hmYQ.png" alt="" /></p>

<p>为价格变动创建的借项通知单
<img src="/files/hozZAXO.png" alt="" /></p>

<p>提交借项通知单后，原始采购发票的应付金额将减少借项通知单的金额。
<img src="/files/qzJIBno.png" alt="" /></p>
