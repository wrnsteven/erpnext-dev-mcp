<body>
    <h1>差异分录</h1>

    <p>根据会计准则，会计分录中的借方必须等于贷方。如果不相等，系统不允许提交会计交易，从而停止账本过账。在 ERPNext 中，保存会计分录时，系统会验证借贷是否平衡。</p>

    <p><img src="/files/journal-entry-message.png" alt="Debit and Credit" /></p>

    <p>要使分录平衡，你应该再添加一行，选择另一个账户，并更新不同的金额。或者你可以在其中一个账户行中添加差异金额。</p>

    <p>点击"生成差异分录"按钮时，将在日记账分录账户表下添加新行，包含差异金额。你可以编辑该行以选择适当的账户。</p>

    <p><img src="/files/difference-entry.gif" alt="Difference Entry" /></p>

    <p>在新行下选择账户后，借贷分录将平衡，你应该能够正确提交日记账分录。</p>

</body>
</html>
