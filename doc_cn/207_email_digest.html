    <h1>电子邮件摘要</h1>

    <p><strong>电子邮件摘要允许你直接在你的电子邮件收件箱中获取有关销售、支出和其他关键数字的定期更新。</strong></p>

    <p>电子邮件摘要是高层管理人员跟踪"已预订销售额"、"已收款金额"或"已开票金额"等大数字的好方法。</p>

    <p>要设置电子邮件摘要，请进入：</p>

    <blockquote>
    <p>首页 &gt; 设置 &gt; 电子邮件摘要</p>
    </blockquote>

    <ol>
    <li>输入电子邮件摘要的名称。</li>
    <li>设置发送邮件的频率。</li>
    <li>添加或删除收件人。</li>
    <li>选择要包含在摘要中的项目。</li>
    <li>保存。</li>
    </ol>
