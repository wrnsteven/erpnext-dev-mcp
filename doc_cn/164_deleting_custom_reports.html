    <h1>删除自定义报告</h1>

    <p>ERPNext 有多种<a href="/erpnext/making-custom-reports">类型的报告</span></p>

<p>如果有需要删除的自定义报告，可以通过以下步骤实现。请注意，这仅适用于自定义报告，不适用于标准报告。</p>

<h4 id="step-1-go-to-report-list">步骤 1：进入报告列表</h4>

<p>在 Awesome Bar 中，输入并选择"报告列表"选项。</p>

<p><img src="/files/customize-deleting-reports-1.png" alt="Report Search" /></p>

<h4 id="step-2-delete-the-report-from-the-list">步骤 2：从列表中删除报告</h4>

<p>报告列表将包含你账户的所有标准和自定义报告。你可以直接从列表中选择要删除的自定义报告，然后点击操作菜单中的删除图标。</p>

<p><img src="/files/customize-deleting-reports.png" alt="Report List" /></p>

<p>或者你可以打开该报告，然后从文件菜单中删除它。</p>

<p><img src="/files/customize-deleting-reports-2.png" alt="Report Delete" /></p>

</body>
</html>
