    <title>禁用四舍五入总额</title>

<body>
    <h1>禁用四舍五入总额</h1>

    <p>所有销售交易（如销售订单、销售发票）都有四舍五入总额。它是根据总计金额计算的。此外，四舍五入总额也显示在标准打印格式中。</p>

    <blockquote>
    <p>注意：四舍五入总额是<strong>销售</strong>交易中的一个功能。</p>
    </blockquote>

    <p><img src="/files/customize-disable-rounded-total-2.png" alt="Print Preview" /></p>

    <p>但是，如果你想禁用它，你可以按照以下步骤为所有销售交易从标准打印格式中隐藏四舍五入总额。</p>

    <h4>步骤 1：进入全局默认</h4>

    <p>从 Awesome Bar 搜索全局默认</p>

    <h4>步骤 2：禁用四舍五入总额</h4>

    <p>勾选"禁用四舍五入总额"，然后点击保存。</p>

    <p><img src="/files/customize-disable-rounded-total.png" alt="Print Preview" /></p>

    <p>要验证更改，你应该清除缓存和/或刷新你的 ERPNext 账户。然后你的打印格式将不会为四舍五入总额呈现值。</p>

    <blockquote>
    <p>注意：此设置仅影响标准打印格式。</p>
    </blockquote>

</body>
</html>
