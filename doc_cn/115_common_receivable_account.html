    <h1>通用应收账款账户</h1>

    <p>根据交易对手模型，一个名为<strong>债务人</strong>的通用应收账款账户会自动创建。这是所有客户的默认应收账款账户。</p>

    <p><img src="/files/common-receivable.png" alt="Role Desk Permission" /></p>

    <p>如果需要，你也可以创建一个新的应收账款账户并在客户主数据中更新。</p>

    <p><strong>问题：</strong>我应该为每个客户创建单独的应收账款账户吗？</p>

    <p><strong>答案：</strong>你可以，但这不是推荐的方法。如果你希望为每个客户创建单独的应收账款账户来进行应收款跟踪，则不需要。你仍然可以查看每个客户的应收账款和总账报告。</p>

    <p>与债务人一样，为了跟踪应付款，默认账户称为债权人在应付账款下创建。</p>
</body>
