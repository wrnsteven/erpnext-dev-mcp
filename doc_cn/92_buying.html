    <h1>采购模块简介</h1>

    <p><strong>ERPNext 中的采购模块旨在管理采购流程并优化供应商关系。</strong></p>

<ul>
<li><strong>报价请求 (RFQs)</strong>：评估来自供应商的报价，以便做出明智的采购决策。</li>
<li><strong>供应商管理</strong>：维护供应商的详细记录，包括联系方式、条款和绩效指标。</li>
<li><strong>采购订单</strong>：创建和跟踪采购订单，确保及时准确地完成订单。</li>
<li><strong>采购发票</strong>：处理和管理来自供应商的发票，包括付款处理。</li>
<li><strong>库存管理</strong>：更新库存水平并管理库存补货。</li>
</ul>

<p>采购模块帮助企业简化采购活动、控制采购成本并加强供应商关系。</p>

<p>观看 <a href="https://school.frappe.io/lms/courses/procurement">Frappe School 采购课程</a>了解更多。</p>
