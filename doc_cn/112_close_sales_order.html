    <title>关闭销售订单</title>

<body>
    <h1>关闭销售订单</h1>

    <p>在已提交的销售订单中，你会找到<strong>停止</strong>选项。停止销售订单将限制用户针对该订单创建送货单和销售发票。</p>

    <p><img src="/files/close-option-in-salesOrder.png" alt="Close Option in Sales Order" /></p>

    <h4>场景</h4>

    <p>收到十个风力涡轮机的订单。销售订单也按十个单位创建。由于库存不足，只有七个单位交付给客户。剩余三个单位即将交付。客户通知他们不需要交付待交付的物品，因为他们已从其他供应商购买。</p>

    <p>在这种情况下，送货单和销售发票将仅为七个单位创建。销售订单应设置为已停止。</p>

    <p><img src="/files/closed-sales-order.png" alt="Closed Sales Order" /></p>

    <p>一旦销售订单设置为已停止，你将不会在待交付和待开票报告中看到待处理数量（本例中为三个）。要针对已停止的销售订单进行进一步交易，你应首先取消停止。</p>

    <p>你会在采购订单中找到相同的功能。</p>
</body>
