    <title>Exchange Rate Field Frozen</title>
</head>
<body>
<p>在 ERPNext 中，您可以实时获取货币之间的汇率，也可以保存特定的汇率。在 ERPNext 中，已保存的汇率也称为过期汇率（Stale Exchange Rate）。</p><p>在您的销售和采购交易中，如果货币汇率字段被冻结，那是因为允许交易中过期汇率的功能已启用。如果您希望货币汇率字段再次可编辑，请从以下位置禁用过期汇率功能：</p><p>- <strong>会计</strong> > <strong>会计主数据</strong> > <strong>账户设置</strong>
- 取消勾选"允许过期汇率"字段</p><p>!<a href="../../images/216_allow-stale-exchange-rates.png">图片</a></p><p>- 保存账户设置
- 刷新您的 ERPNext 账户
- 再次检查销售/采购交易</p><p>完成此设置后，交易中的汇率字段应该再次变为可编辑状态。</p>
</body>
</html>
