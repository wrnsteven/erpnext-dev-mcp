    <h1>域设置</h1>

    <p><strong>你可以使用域设置来全局性地保持所选域处于活动状态。</strong></p>

    <p>要访问域设置，请进入：</p>

    <blockquote>
    <p>Home &gt; Settings &gt; Core &gt; Domain Settings</p>
    </blockquote>

    <p>如果某个域被禁用，将发生以下情况：</p>

    <ul>
    <li>该域将在主页上不可用</li>
    <li>与该域相关的 DocTypes 将不再可访问。例如，如果你禁用了 Education 模块，Education 中的 Student 和其他 DocTypes 将不可访问。</li>
    </ul>
