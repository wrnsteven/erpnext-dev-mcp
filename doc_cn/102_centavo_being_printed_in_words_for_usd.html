    <h1>在美元中文大写打印"Centavo"</h1>

    <p>对于货币列表 doctype 中不存在的货币：</p>

    <p>你可以进入货币列表 doctype --> 添加货币 --> 添加汇率 --> 启用货币 --> 然后你可以在任何需要的交易中添加该货币。</p>

    <p><img src="/files/kue13XQ.png" alt="" /></p>

    <p>例如：</p>

    <p><img src="/files/NrkXiGJ.png" alt="" /></p>

    <p>打印格式：</p>

    <p><img src="/files/QKgg11w.png" alt="" /></p>
