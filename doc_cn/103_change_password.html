    <h1>更改用户密码</h1>

    <p><strong>"更改密码"用于更改任何现有用户的密码。</strong></p>

    <p>每个 ERPNext 用户都可以更改其 ERPNext 账户的密码。具有系统管理器角色的用户也可以为自己和其他用户重置密码。</p>

    <h2 id="how-to-change-password"><strong>如何更改密码？</strong></h2>

<ol>
<li>进入用户列表</li>
<li>打开需要更改密码的用户</li>
<li>进入"设置"，展开名为"更改密码"的部分</li>
<li>输入新密码并保存表单</li>
</ol>

    <p><strong>注意：-</strong>根据密码的复杂性，系统会指示输入的密码是弱还是强。</p>
