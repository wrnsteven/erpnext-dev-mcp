    <h1>更改计价方法</h1>

    <p>在 ERPNext 中，用户可以将已有库存交易的物料的计价方法从 FIFO 更改为移动平均法，但不能从移动平均法更改为 FIFO。</p>

    <p>如果用户将某个物料的计价方法从 FIFO 更改为移动平均法，系统将使用移动平均法进行新的外向交易。此外，如果用户创建了倒填日期的交易，则在该倒填日期条目之后创建的所有交易都将使用移动平均法重新过账。这可能导致早期交易的期末余额值发生变化。</p>

    <p>为防止此情况，用户可以通过在库存设置中设置"库存冻结截止日期"来冻结特定日期之前的库存交易。</p>
