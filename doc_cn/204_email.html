    <h1>电子邮件</h1>

    <p>在 ERPNext 中配置电子邮件有一个流程，可以极大地提高系统内的沟通效率和生产力。通过配置你的电子邮件设置，你可以直接从 ERPNext 无缝发送和接收电子邮件，从而能够与客户、供应商和团队成员进行高效的 correspondence，以保持透明度。</p>

    <p>此外，用户可以个性化电子邮件模板、设置自动回复，以及安排电子邮件通知，提高生产力并简化 ERP 系统内的沟通工作流程。</p>
