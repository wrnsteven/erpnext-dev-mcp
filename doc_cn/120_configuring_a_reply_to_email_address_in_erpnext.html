<body>
    <h1>在 ERPNext 中配置回复电子邮件地址</h1>

    <p>"回复到"电子邮件地址是根据所需电子邮件账户中的"默认收件"复选框设置的。</p>

    <p><img src="/files/ywBv6dX.png" alt="" /></p>

    <p>先决条件：</p>

    <p>你必须在"电子邮件账户" DocType 中为所需电子邮件地址创建电子邮件地址记录，例如 '<a href="mailto:abc@test.com">abc@test.com</a>'。</p>

    <p>步骤：</p>

    <p>在"电子邮件账户" DocType 中为电子邮件地址 '<a href="mailto:abc@test.com">abc@test.com</a>' 创建的记录中，启用"启用收件"复选框，然后启用"默认收件"复选框。启用"默认收件"复选框将把此电子邮件设置为"回复到"（如下图示例）。</p>

    <p><img src="/files/r5jqCdA.png" alt="" /></p>

    <p>有关电子邮件账户的更多信息，请点击<a href="/erpnext/email-account">此处</a>。</p>
</body>
</html>
