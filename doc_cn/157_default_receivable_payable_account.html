    <h1>默认应收/应付账户</h1>

    <p><strong>问题：</strong><br />
如何将应收或应付账户与交易对象（客户/供应商）关联起来？<br />
<strong>答案：</strong><br />
在 ERPNext 中，用于跟踪应收（应收账款）和应付（应付账款）的账户会在账户架构主数据中自动创建。这些账户也会在公司主数据中设置为默认应收和应付账户。如果你希望使用这些默认账户，则不需要为每个交易对象指定。<br />
但是，如果你在账户架构中创建了多个应收和应付账户，你可以从客户或供应商主数据中将特定账户与特定交易对象关联。在这些主数据中，查看"会计部分"。
