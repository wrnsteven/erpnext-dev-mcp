    <h1>列表视图中的排序顺序</h1>

    <p><strong>问题：</strong>我希望物料列表中的记录按物料代码降序排列。</p>

<p><strong>答案：</strong>以下是自定义物料主数据排序顺序的步骤。这些步骤也适用于自定义其他文档的排序顺序。</p>

<h4 id="step-1-go-to-customize-form">步骤 1：进入自定义表单</h4>

<blockquote>
<p>首页 > 自定义 > 表单自定义 > 自定义表单</p>
</blockquote>

<h4 id="step-2-select-doctype">步骤 2：选择 DocType</h4>

<p>选择要自定义排序顺序的文档类型。</p>

<p><img src="/files/customize-sorting-order-2.png" alt="Sort Order field" /></p>

<h4 id="step-3-update-sort-details">步骤 3：更新排序详情</h4>

<p>在自定义表单中，你将找到以下字段。</p>

<p><img src="/files/customize-sort-field.png" alt="Sort Order Field" /></p>
<p><img src="/files/customize-sorting-order-1.png" alt="Sort Order field" /></p>

<ol>
<li>排序字段：选择要作为排序依据的字段。在这种情况下，它是"物料代码"字段。</li>
<li>排序顺序：排序顺序有两个可能的选项，<strong>升序</strong>和<strong>降序</strong>。</li>
</ol>

</body>
</html>
