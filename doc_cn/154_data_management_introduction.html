    <h1>简介</h1>

    <p>数据管理对于有效使用 ERP 系统至关重要。ERP 软件将来自不同业务功能的数据（如财务、库存、销售和人力资源）整合到一个系统中。为了使系统可靠运行，数据必须准确、一致且维护得当。</p>

<p>在本教程中，我们将学习用户如何从不同来源（如电子表格）将数据导入 ERPNext，以及从 ERPNext 导出数据的方法。</p>
