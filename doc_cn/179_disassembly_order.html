    <h1>拆卸订单</h1>

    <p>ERPNext 中的"拆卸订单"用于拆解成品，并将状况良好的组件退回仓库。系统允许用户在将组件退回仓库时更改其估值汇率。</p>

    <p>要创建"拆卸订单"，请打开状态为<strong>已完成</strong>或<strong>已关闭</strong>的工单。点击创建按钮，然后点击"拆卸订单"。</p>

    <p><img src="/files/work-order-disassembly-orderfe73b5.png" alt="工单-拆卸订单" /></p>

    <p>用户点击"拆卸订单"按钮后，系统将打开类型为"拆卸"的库存交易。</p>

    <p><img src="/files/stock-entry-disassembly-order.png" alt="库存交易-拆卸订单" /></p>

    <ul>
    <li>用户可以手动移除状况不佳的物料</li>
    <li>系统默认根据过去的交易获取基本汇率。如果需要，用户可以编辑原材料的基本汇率。</li>
    </ul>

</body>
