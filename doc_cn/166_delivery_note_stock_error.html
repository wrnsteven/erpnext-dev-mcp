    <title>交货单负库存错误</title>
</head>
<body>
    <h1>交货单负库存错误</h1>

    <p><strong>问题</strong>：提交交货单时，收到消息说物料库存不足，但我们在仓库中有物料库存。</p>

    <p><strong>答案</strong>：提交交货单时，会根据交货单的分录日期和时间检查库存水平。你可能在仓库中有物料库存。但是，如果你创建的是回溯日期的交货单，并且物料在交货单的分录日期和时间在仓库中不可用，你可能会收到负库存错误消息。你可以参考库存账本报告来确认相同的情况。</p>

    <p>如果是这种情况，你应该编辑交货单的分录日期和时间，并确保它在物料收货分录的分录日期和时间之后。</p>

</body>
</html>
